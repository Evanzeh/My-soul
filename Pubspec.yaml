name: my_soul
description: Dating app for Kenyans only
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^2.32.0
  firebase_auth: ^4.19.6
  cloud_firestore: ^4.17.4
  firebase_storage: ^11.7.6
  flutter_card_swiper: ^7.0.1
  cached_network_image: ^3.3.1
  geolocator: ^11.0.0
  http: ^1.2.2
  intl: ^0.19.0
  provider: ^6.1.2
  google_fonts: ^6.2.1
